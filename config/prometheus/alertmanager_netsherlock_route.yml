# Alertmanager route configuration for netsherlock webhook
# Add this to alertmanager.yml routes and receivers.

route:
  routes:
    - match:
        job: vm_ping_monitor
      receiver: netsherlock
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 5m

receivers:
  - name: netsherlock
    webhook_configs:
      - url: "http://<netsherlock-host>:8080/webhook/alertmanager"
        http_config:
          headers:
            X-API-Key: "<your-api-key>"
        send_resolved: false
