# NetSherlock Test Alert Rules for E2E Testing
# Updated: 2026-02-05
#
# Simplified rules for E2E testing - only 2 alerts to avoid duplicate triggers
#
# Thresholds:
#   - Latency: P90 > 15ms (15,000,000 ns)
#   - Packet Loss: > 3% (raised from 1% to avoid false positives from real network issues)
#
# Usage:
# 1. Copy this file to /etc/prometheus/ on a Prometheus host
# 2. Add to prometheus.yml rule_files: - netsherlock_test_alert.yml
# 3. Reload Prometheus: curl -X POST http://prometheus:password@host:9090/-/reload

groups:
  - name: netsherlock_e2e_test
    interval: 15s
    rules:
      # ============================================================
      # System Network Latency Alert
      # Threshold: P90 > 15ms
      # Fault injection: 20ms delay on port-storage
      # ============================================================
      - alert: NetSherlockHostLatencyDevTest
        expr: |
          max without(instance) (
            histogram_quantile(0.9, rate(host_to_host_max_ping_time_ns_bucket[1m]))
          ) > 1.5e+07
        for: 10s
        labels:
          network_type: "system"
          severity: "warning"
        annotations:
          summary: "Storage network P90 latency: {{ $labels.hostname }} → {{ $labels.to_hostname }}"
          description: "P90 ping latency {{ $value | humanizeDuration }} exceeds 15ms threshold"
          src_hostname: "{{ $labels.hostname }}"
          dst_hostname: "{{ $labels.to_hostname }}"

      # ============================================================
      # System Network Packet Loss Alert
      # Threshold: 3% < loss < 100% (filter abnormal values > 100%)
      # Fault injection: 10% packet loss on port-storage
      # Note: Metric unit is percentage (5% = 5, not 0.05)
      # Note: Only alert on node32 -> node31 path for testing
      # UUID mapping: 66cb384e-d6e5-11ed-9faf-525400111812 = node32
      # ============================================================
      - alert: HostNetworkPacketLossDevTest
        expr: |
          label_replace(
            (host_network_ping_packet_loss_percent{_network="storage", _host="66cb384e-d6e5-11ed-9faf-525400111812", to_hostname="node31"} > 3)
            and
            (host_network_ping_packet_loss_percent{_network="storage", _host="66cb384e-d6e5-11ed-9faf-525400111812", to_hostname="node31"} < 100),
            "hostname",
            "node32",
            "_host",
            ".*"
          )
        for: 10s
        labels:
          network_type: "system"
          severity: "warning"
          problem_type: "packet_drop"
        annotations:
          summary: "Host network packet loss: {{ $labels.hostname }} → {{ $labels.to_hostname }}"
          description: "Packet loss {{ $value | printf \"%.2f\" }}% exceeds 3% threshold"
          src_hostname: "{{ $labels.hostname }}"
          dst_hostname: "{{ $labels.to_hostname }}"
