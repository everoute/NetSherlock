# E2E Test Configuration for phy-620
# Environment: os620-kernel-419-intel-physical

version: "1.0"
environment: "phy-620"

# Node definitions (NetSherlock naming convention)
nodes:
  # Sender side (vm-sender sends ping to vm-receiver)
  host-sender:
    ssh: "smartx@192.168.70.32"
    workdir: "/home/smartx/lcc"
    role: "host"

  vm-sender:
    ssh: "root@192.168.77.83"
    workdir: "/root/lcc"
    role: "vm"
    host_ref: "host-sender"
    uuid: "8cd88df6-11bc-4341-a968-f3c8b9d944df"
    test_ip: "192.168.77.83"

  # Receiver side
  host-receiver:
    ssh: "smartx@192.168.70.31"
    workdir: "/home/smartx/lcc"
    role: "host"

  vm-receiver:
    ssh: "root@192.168.76.244"
    workdir: "/root/lcc"
    role: "vm"
    host_ref: "host-receiver"
    uuid: "a8366b2a-a709-4e88-ba57-128681bd1efb"
    test_ip: "192.168.76.244"

# Test pairs
test_pairs:
  vm:
    server: "vm-receiver"    # Receiver (BPF listener starts first)
    client: "vm-sender"      # Sender (ping initiator)
