<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="22" fill="#F0F9FF" stroke="#2563EB" stroke-width="1.5"/>

  <!-- Radar circles -->
  <circle cx="24" cy="24" r="14" fill="none" stroke="#BFDBFE" stroke-width="1"/>
  <circle cx="24" cy="24" r="8" fill="none" stroke="#93C5FD" stroke-width="1"/>

  <!-- Radar lines (forming a cross) -->
  <line x1="24" y1="10" x2="24" y2="38" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="24" x2="38" y2="24" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Diagonal lines for network effect -->
  <line x1="15" y1="15" x2="33" y2="33" stroke="#60A5FA" stroke-width="1" stroke-linecap="round"/>
  <line x1="33" y1="15" x2="15" y2="33" stroke="#60A5FA" stroke-width="1" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="24" cy="24" r="3" fill="#2563EB"/>

  <!-- Corner diagnostic points -->
  <circle cx="16" cy="16" r="1.5" fill="#3B82F6"/>
  <circle cx="32" cy="16" r="1.5" fill="#3B82F6"/>
  <circle cx="16" cy="32" r="1.5" fill="#3B82F6"/>
  <circle cx="32" cy="32" r="1.5" fill="#3B82F6"/>
</svg>
