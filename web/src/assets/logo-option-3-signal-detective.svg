<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="signalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284C7;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="pulseGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0284C7;stop-opacity:0.2" />
    </radialGradient>
  </defs>

  <!-- Pulse waves (diagnostic signals) -->
  <circle cx="24" cy="24" r="20" fill="none" stroke="url(#signalGradient)" stroke-width="1" opacity="0.3" stroke-dasharray="2,2"/>
  <circle cx="24" cy="24" r="15" fill="none" stroke="url(#signalGradient)" stroke-width="1" opacity="0.5" stroke-dasharray="2,2"/>
  <circle cx="24" cy="24" r="10" fill="none" stroke="url(#signalGradient)" stroke-width="1.2" opacity="0.7"/>

  <!-- Signal lines (detection rays) -->
  <line x1="24" y1="24" x2="24" y2="4" stroke="url(#signalGradient)" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="24" y1="24" x2="24" y2="44" stroke="url(#signalGradient)" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="24" y1="24" x2="44" y2="24" stroke="url(#signalGradient)" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="24" y1="24" x2="4" y2="24" stroke="url(#signalGradient)" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>

  <!-- Diagonal signal detection -->
  <line x1="24" y1="24" x2="34" y2="14" stroke="#06B6D4" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="24" y1="24" x2="34" y2="34" stroke="#06B6D4" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="24" y1="24" x2="14" y2="14" stroke="#06B6D4" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="24" y1="24" x2="14" y2="34" stroke="#06B6D4" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- Central analysis core -->
  <circle cx="24" cy="24" r="3" fill="url(#pulseGradient)"/>
  <circle cx="24" cy="24" r="3" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.6"/>

  <!-- Detection points (network nodes) -->
  <circle cx="24" cy="8" r="1" fill="#0284C7" opacity="0.9"/>
  <circle cx="40" cy="24" r="1" fill="#0284C7" opacity="0.9"/>
  <circle cx="24" cy="40" r="1" fill="#0284C7" opacity="0.9"/>
  <circle cx="8" cy="24" r="1" fill="#0284C7" opacity="0.9"/>

  <!-- Corner detection indicators -->
  <circle cx="34" cy="14" r="0.8" fill="#0EA5E9" opacity="0.7"/>
  <circle cx="34" cy="34" r="0.8" fill="#0EA5E9" opacity="0.7"/>
  <circle cx="14" cy="14" r="0.8" fill="#0EA5E9" opacity="0.7"/>
  <circle cx="14" cy="34" r="0.8" fill="#0EA5E9" opacity="0.7"/>
</svg>