<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="lensGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Magnifying glass outer circle (lens) -->
  <circle cx="20" cy="20" r="15" fill="none" stroke="url(#lensGradient)" stroke-width="2" filter="url(#glow)"/>

  <!-- Magnifying glass handle -->
  <line x1="31" y1="31" x2="40" y2="40" stroke="url(#lensGradient)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Network nodes inside the lens -->
  <circle cx="14" cy="14" r="1.2" fill="#06B6D4" filter="url(#glow)"/>
  <circle cx="26" cy="14" r="1.2" fill="#06B6D4" filter="url(#glow)"/>
  <circle cx="20" cy="24" r="1.2" fill="#06B6D4" filter="url(#glow)"/>
  <circle cx="14" cy="26" r="1.2" fill="#06B6D4" filter="url(#glow)"/>
  <circle cx="26" cy="26" r="1.2" fill="#06B6D4" filter="url(#glow)"/>

  <!-- Connection lines between nodes -->
  <line x1="14" y1="14" x2="20" y2="24" stroke="#0EA5E9" stroke-width="0.7" opacity="0.6"/>
  <line x1="26" y1="14" x2="20" y2="24" stroke="#0EA5E9" stroke-width="0.7" opacity="0.6"/>
  <line x1="14" y1="26" x2="20" y2="24" stroke="#0EA5E9" stroke-width="0.7" opacity="0.6"/>
  <line x1="26" y1="26" x2="20" y2="24" stroke="#0EA5E9" stroke-width="0.7" opacity="0.6"/>
  <line x1="14" y1="14" x2="26" y2="26" stroke="#0EA5E9" stroke-width="0.6" opacity="0.4"/>
  <line x1="26" y1="14" x2="14" y2="26" stroke="#0EA5E9" stroke-width="0.6" opacity="0.4"/>

  <!-- Center analysis point -->
  <circle cx="20" cy="20" r="2" fill="url(#lensGradient)" filter="url(#glow)"/>

  <!-- Subtle diagnostic indicator -->
  <circle cx="20" cy="20" r="3.5" fill="none" stroke="#06B6D4" stroke-width="0.7" opacity="0.3" stroke-dasharray="2,2"/>
</svg>